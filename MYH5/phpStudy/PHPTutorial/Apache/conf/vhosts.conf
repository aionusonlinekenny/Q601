<VirtualHost _default_:80>
DocumentRoot "D:\MYH5\my_web"

  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule ^/ws/(\d+)/$ ws://127.0.0.1:$1/ [P,L]

  ProxyRequests Off
  ProxyTimeout 300
  ProxyPass /ws/8025/ ws://127.0.0.1:8025/ flushpackets=on keepalive=On
  ProxyPassReverse /ws/8025/ ws://127.0.0.1:8025/
  ProxyPass /ws/8026/ ws://127.0.0.1:8026/ flushpackets=on keepalive=On
  ProxyPassReverse /ws/8026/ ws://127.0.0.1:8026/
  ProxyPass /ws/8027/ ws://127.0.0.1:8027/ flushpackets=on keepalive=On
  ProxyPassReverse /ws/8027/ ws://127.0.0.1:8027/

  <Directory "D:\MYH5\my_web">
    Options -Indexes -FollowSymLinks +ExecCGI
    AllowOverride All
    Order allow,deny
    Allow from all
    Require all granted
  </Directory>
</VirtualHost>


<VirtualHost *:80>
    DocumentRoot "D:\MYH5\phpStudy\PHPTutorial\WWW"
    ServerName www.gohosts.com
    ServerAlias gohosts.com
  <Directory "D:\MYH5\phpStudy\PHPTutorial\WWW">
      Options FollowSymLinks ExecCGI
      AllowOverride All
      Order allow,deny
      Allow from all
     Require all granted
  </Directory>
</VirtualHost>
